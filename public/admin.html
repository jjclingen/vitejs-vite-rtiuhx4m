import { initializeApp }

import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider }

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let me           = null;      // Firebase Auth user
let groups       = [];
let selGroup     = null;
let groupData    = null;
let loading      = false;
let selUser      = 'all';
let dateFilter   = 'today';
let customDate   = todayStr();

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function r(n)   { return Math.round((n||0)*10)/10; }

function dateRange() {
  const today = todayStr();
  if (dateFilter === 'today')     return [today, today];
  if (dateFilter === 'custom')    return [customDate, customDate];
  if (dateFilter === 'yesterday') {
    const d = new Date(); d.setDate(d.getDate()-1);
    const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    return [s, s];
  }
  if (dateFilter === 'week')  {
    const d = new Date(); d.setDate(d.getDate()-7);
    return [`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, today];
  }
  if (dateFilter === 'month') {
    const d = new Date(); d.setDate(d.getDate()-30);
    return [`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, today];
  }
  return ['2020-01-01', '2099-12-31']; // all
}

function userName(uid) {
  const u = (groupData?.users||[]).find(u => u.id === uid);
  return u?.name || '?';
}

function userColor(uid) {
  const u = (groupData?.users||[]).find(u => u.id === uid);
  return u?.color || '#6366f1';
}

// ─────────────────────────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────────────────────────
async function loadGroups() {
  const snap = await getDoc(doc(db, 'users', me.uid));
  if (!snap.exists()) return [];
  const ids = snap.data().groups || [];
  const docs = await Promise.all(ids.map(id => getDoc(doc(db, 'groups', id))));
  return docs.filter(d => d.exists()).map(d => ({id: d.id, ...d.data()}));
}

async function loadGroupData(gid) {
  const COLS = ['foodEntries','exerciseEntries','weightEntries','waterEntries'];
  const [gSnap, ...colSnaps] = await Promise.all([
    getDoc(doc(db, 'groups', gid)),
    ...COLS.map(c => getDocs(collection(db, 'groups', gid, c))),
    getDocs(collection(db, 'groups', gid, 'profiles')),
  ]);
  const g = gSnap.exists() ? gSnap.data() : {};
  const [food, ex, wt, water, profiles] = colSnaps.map(s => s.docs.map(d => ({...d.data(), id:d.id})));
  return { ...g, users: profiles, foodEntries: food, exerciseEntries: ex, weightEntries: wt, waterEntries: water };
}

// ─────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('app');
  if (!me)     { root.innerHTML = loginScreen(); bindLogin(); return; }
  if (!ADMIN_EMAILS.includes(me.email)) { root.innerHTML = deniedScreen(); bindDenied(); return; }
  root.innerHTML = portalScreen();
  bindPortal();
}

            ${food.length>0?`<span class="text-xs text-slate-500">${sumCal} kcal &nbsp;P:${sumProt}g &nbsp;C:${sumCarb}g &nbsp;F:${sumFat}g</span>`:''}

                <tr class="bg-slate-700/60 text-[11px] text-slate-400 uppercase tracking-wider">
                  <th class="text-left px-4 py-2.5 font-semibold">Date</th>
                  <th class="text-left px-4 py-2.5 font-semibold">User</th>
                  <th class="text-right px-4 py-2.5 font-semibold">Weight (lbs)</th>
                </tr>
              </thead>
              <tbody>
                ${wts.map((e,i)=>`
                  <tr class="border-t border-slate-700/50 ${i%2===1?'bg-slate-700/20':''}">
                    <td class="px-4 py-2 text-slate-400 font-mono text-xs">${e.date}</td>
                    <td class="px-4 py-2">
                      <span class="inline-flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full" style="background:${userColor(e.userId)}"></span>
                        <span class="font-medium text-xs">${userName(e.userId)}</span>
                      </span>
                    </td>
                    <td class="px-4 py-2 text-right font-bold text-purple-400">${e.weight} lbs</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </section>`:``}

        <!-- Water -->
        ${waters.length>0?`
        <section>
          <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Water — ${waters.length} entries</h2>
          <div class="print-card bg-slate-800 rounded-2xl overflow-hidden">
            <table class="print-table w-full text-sm border-collapse">
              <thead>
                <tr class="bg-slate-700/60 text-[11px] text-slate-400 uppercase tracking-wider">
                  <th class="text-left px-4 py-2.5 font-semibold">Date</th>
                  <th class="text-left px-4 py-2.5 font-semibold">User</th>
                  <th class="text-right px-4 py-2.5 font-semibold">Amount (oz)</th>
                </tr>
              </thead>
              <tbody>
                ${waters.map((e,i)=>`
                  <tr class="border-t border-slate-700/50 ${i%2===1?'bg-slate-700/20':''}">
                    <td class="px-4 py-2 text-slate-400 font-mono text-xs">${e.date}</td>
                    <td class="px-4 py-2">
                      <span class="inline-flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full" style="background:${userColor(e.userId)}"></span>
                        <span class="font-medium text-xs">${userName(e.userId)}</span>
                      </span>
                    </td>
                    <td class="px-4 py-2 text-right font-bold text-blue-400">${e.amount} oz</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </section>`:``}

      `}
    </main>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// EVENT BINDING
// ─────────────────────────────────────────────────────────────────
function bindLogin() {
  document.getElementById('signInBtn')?.addEventListener('click', () => signInWithPopup(auth, provider).catch(console.error));
}
function bindDenied() {
  document.getElementById('signOutBtn')?.addEventListener('click', () => signOut(auth));
}
function bindPortal() {
  document.getElementById('signOutBtn')?.addEventListener('click', () => signOut(auth));

  document.querySelectorAll('.grp-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      if (selGroup?.id === id) return;
      selGroup  = groups.find(g => g.id === id);
      groupData = null;
      selUser   = 'all';
      dateFilter = 'today';
      loading   = true;
      render();
      groupData = await loadGroupData(id);
      loading   = false;
      render();
    });
  });

  document.getElementById('selUser')?.addEventListener('change', e => { selUser = e.target.value; render(); });
  document.getElementById('selDate')?.addEventListener('change', e => { dateFilter = e.target.value; render(); });
  document.getElementById('customDateIn')?.addEventListener('change', e => { customDate = e.target.value; render(); });
}

// ─────────────────────────────────────────────────────────────────
// AUTH LISTENER
// ─────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  me = user;
  if (user && ADMIN_EMAILS.includes(user.email)) {
    groups = await loadGroups();
  } else {
    groups = [];
  }
  render();
});
</script>
</body>
</html>
